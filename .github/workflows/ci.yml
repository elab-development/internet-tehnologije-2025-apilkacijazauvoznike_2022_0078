name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "feat/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run automated tests
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test_jwt_secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg JWT_SECRET=test_jwt_secret \
            --build-arg DATABASE_URL=postgresql://app:app@localhost:5432/iteh_uvoznici \
            -t iteh-uvoznici-app .